<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دروس السيد علي السبزواري</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>آية الله السيد علي السبزواري</h1>
    </header>
    <main>
        <div id="lessons-container">
            <p>جاري تحميل الدروس...</p>
        </div>
    </main>
    <footer>
        <div id="admin-section">
            <input type="password" id="password-input" placeholder="كلمة المرور">
            <button id="login-btn">تسجيل الدخول</button>
            <button id="logout-btn" style="display:none;">خروج</button>
        </div>
        <div id="add-lesson-form" style="display:none;">
            <h3>إضافة درس جديد</h3>
            <input type="text" id="lesson-title" placeholder="عنوان الدرس" required>
            <input type="file" id="audio-file" accept="audio/*" required>
            <button id="add-btn">إضافة الدرس</button>
            <p id="status-msg"></p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
