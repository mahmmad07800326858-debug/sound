<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دروس السيد علي السبزواري</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>آية الله السيد علي السبزواري</h1>
    </header>
    <main>
        <div id="lessons-container">
            <p>جاري تحميل الدروس...</p>
        </div>
    </main>
    <footer>
        <!-- زر الإضافة الرئيسي -->
        <button id="show-add-form-btn">➕ إضافة درس جديد</button>

        <!-- نموذج الإضافة (مخفي) -->
        <div id="add-lesson-form" style="display:none;">
            <h3>إضافة درس</h3>
            <input type="text" id="lesson-title" placeholder="عنوان الدرس" required>
            <input type="file" id="audio-file" accept="audio/*" required>
            <button id="upload-btn">رفع الدرس</button>
            <p id="status-msg"></p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
