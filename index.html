<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دروس السيد علي السبزواري</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>آية الله السيد علي السبزواري</h1>
        <p>الدروس الصوتية</p>
    </header>

    <main>
        <div id="lessons-container">
            <p>جاري تحميل الدروس...</p>
        </div>
    </main>

    <footer>
        <!-- أزرار الإدارة -->
        <div id="admin-buttons">
            <button id="show-add-form-btn">➕ إضافة درس جديد</button>
            <button id="logout-btn" style="display:none;">🚪 خروج من الإدارة</button>
        </div>

        <!-- نموذج إضافة درس (يظهر بعد كلمة المرور) -->
        <div id="add-lesson-form" style="display:none;">
            <h3>إضافة درس جديد</h3>
            <input type="text" id="lesson-title" placeholder="عنوان الدرس" required>
            <input type="file" id="audio-file" accept="audio/*" required>
            <button id="upload-btn">رفع الدرس</button>
            <p id="status-msg"></p>
        </div>

        <!-- نموذج تعديل درس (يظهر عند اختيار تعديل) -->
        <div id="edit-lesson-form" style="display:none;">
            <h3>تعديل الدرس</h3>
            <input type="hidden" id="edit-lesson-id">
            <input type="text" id="edit-lesson-title" placeholder="عنوان الدرس" required>
            <input type="file" id="edit-audio-file" accept="audio/*">
            <small>اترك الملف فارغاً للاحتفاظ بالصوت الحالي</small>
            <button id="save-edit-btn">حفظ التعديلات</button>
            <button id="cancel-edit-btn">إلغاء</button>
            <p id="edit-status-msg"></p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
